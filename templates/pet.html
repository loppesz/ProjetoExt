<link rel="stylesheet" href="/static/css/petadopt.css">
<link rel="stylesheet" href="/static/css/pet.css">
</head>
<body>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- NAV -->
<nav class="nav">
  <div class="nav-i">
    <a href="/" class="logo">🐾 PetAdopt</a>
    <ul class="nav-links">
      <li><a href="/pets" class="nav-link">Encontrar Pet</a></li>
      <li><a href="/ongs" class="nav-link">ONGs</a></li>
      <li><a href="/new-pet" class="nav-link">Cadastrar Pet</a></li>
      <li><a href="/sobre" class="nav-link">Sobre</a></li>
    </ul>
    <div class="nav-auth">
      <a href="/login" class="btn-nav-login">Entrar</a>
      <a href="/register" class="btn-nav-register">Criar conta</a>
    </div>
  </div>
</nav>

<!-- BREADCRUMB -->
<div class="breadcrumb-wrap">
  <nav class="breadcrumb" aria-label="Breadcrumb">
    <a href="index.html">Início</a>
    <span class="sep">›</span>
    <a href="pets.html">Pets</a>
    <span class="sep">›</span>
    <span class="bc-current" id="bc-name">…</span>
  </nav>
</div>

<!-- DETAIL CONTENT (rendered by pet.js) -->
<div class="detail-wrap reveal" id="detail-content">
  <!-- JS renders gallery + info panel here -->
</div>

<!-- SIMILAR PETS -->
<section class="similar-section reveal reveal-delay-1">
  <h2 class="similar-title">Outros pets disponíveis 🐾</h2>
  <div id="similar-grid"></div>
</section>

<!-- ADOPTION MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)" role="dialog" aria-modal="true" aria-labelledby="modal-heading">
  <div class="modal-box" id="modal-content">
    <!-- JS renders modal content here -->
  </div>
</div>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-compact">
    <div class="footer-logo">🐾 PetAdopt</div>
    <span style="font-size:.88rem;color:rgba(255,255,255,0.5)">Conectando pets a lares cheios de amor.</span>
  </div>
  <div class="footer-bar">
    <span>© 2025 PetAdopt. Feito com ❤️ para os animais.</span>
    <span>🐾 Adote, não compre.</span>
  </div>
</footer>

<script src="/static/js/pet.js"></script>
<script>
// ===== SCROLL REVEAL =====
(function () {
  var els = document.querySelectorAll('.reveal');
  if (!els.length) return;
  var observer = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.08 });
  els.forEach(function (el) { observer.observe(el); });
})();
</script>
</body>
</html>
